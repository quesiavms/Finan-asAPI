<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Finance Control</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="logo" onclick="showHome()">💸 Finance Control</div>

  <nav class="menu">
    <div class="menu-item" onclick="showHome()">Home</div>

    <div class="menu-item">
      Categorias
      <div class="dropdown">
        <span onclick="openModal('categoria')">➕ Adicionar</span>
        <span onclick="showScreen('categorias')">📊 Histórico</span>
      </div>
    </div>

    <div class="menu-item">
      Entradas
      <div class="dropdown">
        <span onclick="openModal('entrada')">➕ Adicionar</span>
        <span onclick="showScreen('entradas')">📊 Histórico</span>
      </div>
    </div>

    <div class="menu-item">
      Saídas
      <div class="dropdown">
        <span onclick="openModal('saida')">➕ Adicionar</span>
        <span onclick="showScreen('saidas')">📊 Histórico</span>
      </div>
    </div>
  </nav>
</header>

<main id="content">
</main>

<main>
  <section id="chat-section">
    <h2>Chat Financeiro</h2>
    <textarea id="chatInput" placeholder="Digite sua pergunta aqui..."></textarea>
    <button id="sendBtn">Enviar</button>
    <div id="chatResponse">Resposta aparecerá aqui...</div>
  </section>

  <section id="dynamic-content"></section>
</main>
<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script src="script.js"></script>
</body>
</html>
